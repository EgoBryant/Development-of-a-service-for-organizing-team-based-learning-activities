# Скопируй в /etc/nginx/sites-available/teamexam (или подключи include)
# Подставь свой домен вместо example.com
# Upstream: Docker слушает 127.0.0.1:8080 (см. docker compose ports)

# Редирект HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name teamexam.munsub.live;

    # Для certbot (первый выпуск/продление webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teamexam.munsub.live;

    # Сертификаты Let's Encrypt (пути после certbot)
    ssl_certificate     /etc/letsencrypt/live/teamexam.munsub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teamexam.munsub.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Ограничения по размеру (загрузка фото в профиле и т.п.)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }
}
