<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Командный зачёт</title>
</head>
<body>
    <main class="single-page-app">
        <section id="homeScreen" class="screen screen-active menu-screen">
            <div class="menu-card">
                <div class="logo-box">ЛОГОТИП</div>
                <button class="start-pill-button" type="button" data-view="sign-in">СТАРТ</button>
            </div>
        </section>

        <section id="appScreen" class="screen auth-screen" aria-live="polite" aria-hidden="true">
            <div id="profileShell" class="profile-shell hidden" aria-hidden="true">
                <div id="profileMount" class="profile-mount"></div>
            </div>

            <div id="authLayout" class="auth-layout" role="dialog" aria-modal="true" aria-label="Вход и регистрация">
                <div id="authModalCard" class="auth-modal-card">
                    <div class="auth-form-column">
                        <div id="formContent" class="form-shell"></div>
                    </div>
                    <aside id="authSwitchColumn" class="auth-switch-column" aria-label="Переключение между входом и регистрацией"></aside>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/src/start.ts"></script>
</body>
</html>
