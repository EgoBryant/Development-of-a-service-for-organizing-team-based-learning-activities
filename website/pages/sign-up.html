<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="../styles/sign-up.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-layout">
            <aside class="promo-panel">
                <a class="panel-button" href="./sign-in.html">ВХОД</a>
            </aside>

            <section class="form-panel">
                <form class="auth-form" action="./sign-up-confirm.html">
                    <h1>РЕГИСТРАЦИЯ</h1>

                    <input name="email" type="email" placeholder="ЭЛЕКТРОННАЯ ПОЧТА" required>
                    <input name="password" type="password" placeholder="ПАРОЛЬ" required>

                    <a class="text-link align-left" href="./sign-up-forget.html">Забыли пароль? Восстановить</a>

                    <button class="primary-button" type="submit">ПРИСОЕДИНИТЬСЯ</button>
                </form>
            </section>
        </section>
    </main>
</body>
</html>
