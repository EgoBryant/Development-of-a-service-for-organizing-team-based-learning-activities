<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="../styles/sign-in-forget.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-layout">
            <aside class="promo-panel">
                <a class="panel-button" href="./sign-in.html">ВХОД</a>
            </aside>

            <section class="form-panel">
                <form class="auth-form" action="./sign-in.html">
                    <h1>ВОССТАНОВЛЕНИЕ</h1>

                    <input name="email" type="email" placeholder="ЭЛЕКТРОННАЯ ПОЧТА" required>
                    <input name="code" type="text" placeholder="КОД ИЗ ПИСЬМА" required>
                    <input name="password" type="password" placeholder="НОВЫЙ ПАРОЛЬ" required>

                    <button class="primary-button" type="submit">СОХРАНИТЬ</button>
                    <a class="text-link" href="./sign-in.html">Вернуться на страницу входа</a>
                </form>
            </section>
        </section>
    </main>
</body>
</html>
