<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение входа</title>
    <link rel="stylesheet" href="../styles/sign-in-confirm.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-layout">
            <aside class="promo-panel">
                <a class="panel-button" href="./sign-up.html">РЕГИСТРАЦИЯ</a>
            </aside>

            <section class="form-panel">
                <div class="auth-form">
                    <h1>ПОДТВЕРЖДЕНИЕ</h1>

                    <input id="savedEmail" type="email" placeholder="ЭЛЕКТРОННАЯ ПОЧТА" readonly>
                    <input id="savedPassword" type="text" placeholder="ПАРОЛЬ" readonly>

                    <div class="confirm-message">
                        Введённые данные сохранены после перехода со страницы входа.
                    </div>

                    <a class="primary-button" href="./menu.html">ПЕРЕЙТИ В МЕНЮ</a>
                </div>
            </section>
        </section>
    </main>

    <script>
        document.getElementById("savedEmail").value = sessionStorage.getItem("signInEmail") || "";
        document.getElementById("savedPassword").value = sessionStorage.getItem("signInPassword") || "";
    </script>
</body>
</html>
