<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="../styles/sign-in.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-layout">
            <section class="form-panel">
                <form id="signInForm" class="auth-form" action="./sign-in-confirm.html">
                    <h1>ВХОД</h1>

                    <input id="signInEmail" name="email" type="email" placeholder="ЭЛЕКТРОННАЯ ПОЧТА" required>
                    <input id="signInPassword" name="password" type="password" placeholder="ПАРОЛЬ" required>

                    <a class="text-link align-left" href="./sign-up-forget.html">Забыли пароль? Восстановить</a>

                    <button class="primary-button" type="submit">ПРИСОЕДИНИТЬСЯ</button>

                    <a class="text-link" href="./sign-up.html">Зарегистрироваться, если нет аккаунта</a>
                </form>
            </section>

            <aside class="promo-panel">
                <a class="panel-button" href="./sign-up.html">РЕГИСТРАЦИЯ</a>
            </aside>
        </section>
    </main>

    <script>
        const signInForm = document.getElementById("signInForm");

        signInForm.addEventListener("submit", function () {
            const email = document.getElementById("signInEmail").value;
            const password = document.getElementById("signInPassword").value;

            sessionStorage.setItem("signInEmail", email);
            sessionStorage.setItem("signInPassword", password);
        });
    </script>
</body>
</html>
