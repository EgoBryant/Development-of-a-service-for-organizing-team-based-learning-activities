<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="../styles/sign-in-forget.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-layout">
            <section class="form-panel">
                <form class="auth-form" action="./sign-in.html">
                    <h1>ВХОД</h1>

                    <input name="email" type="email" placeholder="ЭЛЕКТРОННАЯ ПОЧТА" required>

                    <div class="password-row">
                        <input name="password" type="password" placeholder="ПАРОЛЬ" required>
                        <button class="inline-button" type="submit">ВОССТАНОВИТЬ</button>
                    </div>

                    <a class="primary-button" href="./sign-in-confirm.html">ПРИСОЕДИНИТЬСЯ</a>
                </form>
            </section>

            <aside class="promo-panel">
                <a class="panel-button" href="./sign-up.html">РЕГИСТРАЦИЯ</a>
            </aside>
        </section>
    </main>
</body>
</html>
